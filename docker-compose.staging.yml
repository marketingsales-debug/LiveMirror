version: "3.9"

services:
  # ============================================
  # LiveMirror Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livemirror-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
      - SELFMIRROR_EXECUTION_MODE=docker
    env_file:
      - .env.staging
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - livemirror-net

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: livemirror-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livemirror-net

  # ============================================
  # Frontend (Nginx serving Vue build)
  # ============================================
  frontend:
    image: nginx:alpine
    container_name: livemirror-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - livemirror-net

volumes:
  redis-data:

networks:
  livemirror-net:
    driver: bridge
