version: '3.8'

services:
  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: livemirror-redis
    volumes:
      - redis_data:/data
    restart: always

  # --- Backend (API & Reasoning) ---
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: livemirror-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: always

  # --- Frontend (UI & Visualization) ---
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: livemirror-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  redis_data:
