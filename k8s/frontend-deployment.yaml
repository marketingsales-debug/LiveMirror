apiVersion: apps/v1
kind: Deployment
metadata:
  name: livemirror-frontend
  labels:
    app: livemirror
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: livemirror
      tier: frontend
  template:
    metadata:
      labels:
        app: livemirror
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: marketingsales-debug/livemirror-frontend:latest
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: livemirror
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
  type: LoadBalancer # Expose to public internet
